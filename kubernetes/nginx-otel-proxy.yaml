apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-otel-proxy
  namespace: default
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        
        location /v1/traces {
            proxy_pass http://otel-collector.datadog.svc.cluster.local:4318/v1/traces;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Content-Type application/protobuf;
        }
        
        location / {
            proxy_pass http://localhost:5173;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-otel-proxy
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-otel-proxy
  template:
    metadata:
      labels:
        app: nginx-otel-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d/
      volumes:
      - name: config
        configMap:
          name: nginx-otel-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-otel-proxy
  namespace: default
spec:
  selector:
    app: nginx-otel-proxy
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
