# Lighter-weight alternative to Agent injection: External Secrets Operator
# pulls from Vault and syncs into a native Kubernetes Secret.
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: datadog
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "tic-tac-toe"
          serviceAccountRef:
            name: otel-collector
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: datadog-secret
  namespace: datadog
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: datadog-secret          # creates the K8s Secret the collector reads
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: datadog
        property: api-key
