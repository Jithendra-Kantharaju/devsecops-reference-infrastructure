server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_types text/plain text/css application/json application/javascript;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Browser OpenTelemetry traces are posted same-origin to /v1/traces and
    # proxied to the in-cluster collector. This avoids CORS and keeps the
    # collector address out of the browser bundle.
    #
    # NOTE: set `resolver` to your cluster DNS service ClusterIP
    #   kubectl -n kube-system get svc kube-dns -o jsonpath='{.spec.clusterIP}'
    location /v1/traces {
        resolver 10.96.0.10 valid=10s;
        set $otel_collector "otel-collector.datadog.svc.cluster.local:4318";
        proxy_pass http://$otel_collector/v1/traces;
        proxy_set_header Host $host;
        proxy_set_header Content-Type application/json;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
