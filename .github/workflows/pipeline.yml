name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'kubernetes/deployment-secure.yaml'
      - 'docs/**'
  pull_request:
    branches: [main]

permissions:
  contents: write          # update-k8s commits the image bump
  id-token: write          # AWS OIDC
  security-events: write   # upload SARIF
  packages: write          # push to GHCR

env:
  REGISTRY: ghcr.io
  AWS_REGION: us-east-1

jobs:
  # ---------------- Security scanning ----------------
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  # ---------------- Code quality ----------------
  code-quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ---------------- Policy as code ----------------
  opa-validation:
    name: OPA / Conftest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install conftest
        run: |
          VER=0.56.0
          curl -sL "https://github.com/open-policy-agent/conftest/releases/download/v${VER}/conftest_${VER}_Linux_x86_64.tar.gz" | tar xz
          sudo mv conftest /usr/local/bin/
      - name: Validate manifests (fails on any deny)
        run: conftest test kubernetes/*.yaml -p kubernetes/policies/

  # ---------------- Build ----------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality, opa-validation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with: { name: build-artifacts, path: dist/, retention-days: 5 }

  # ---------------- Docker build, scan, push ----------------
  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [build]
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
      - name: Build (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.secure
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.image }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
      - name: Upload image scan
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
      - name: Push (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.secure
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha

  # ---------------- Audit logging (CloudTrail) ----------------
  audit:
    name: Infrastructure Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Ensure CloudTrail logging is on
        run: aws cloudtrail start-logging --name tic-tac-toe-trail
      - name: Emit deployment audit event
        run: |
          aws events put-events --entries '[{
            "Source": "github.actions",
            "DetailType": "Deployment",
            "Detail": "{\"repo\": \"${{ github.repository }}\", \"sha\": \"${{ github.sha }}\"}"
          }]'

  # ---------------- FinOps ----------------
  cost-analysis:
    name: FinOps Cost Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Last 30 days cost by service
        run: |
          END=$(date -u +%Y-%m-%d)
          START=$(date -u -d '30 days ago' +%Y-%m-%d)
          aws ce get-cost-and-usage \
            --time-period Start=$START,End=$END \
            --granularity MONTHLY --metrics "UnblendedCost" \
            --group-by Type=DIMENSION,Key=SERVICE > cost-report.json
          cat cost-report.json
      - uses: actions/upload-artifact@v4
        with: { name: cost-report, path: cost-report.json }

  # ---------------- Update deployment ----------------
  update-k8s:
    name: Update Deployment Image
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Bump image tag
        run: |
          IMAGE="${{ needs.docker.outputs.image }}:${{ needs.docker.outputs.tag }}"
          sed -i -E "s|image: ghcr.io/.*|image: ${IMAGE}|g" kubernetes/deployment-secure.yaml
          echo "Updated image to ${IMAGE}"
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kubernetes/deployment-secure.yaml
          git commit -m "ci: update image to ${{ needs.docker.outputs.tag }} [skip ci]" || echo "no change"
          git push